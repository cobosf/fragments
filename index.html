```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fragments — Francisco Cobos</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  color:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

a{
  text-decoration:none;
  color:inherit;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  backdrop-filter:blur(10px);
  background:rgba(11,11,11,0.72);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:100;
}

.nav-container{
  width:90%;
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-weight:700;
}

.menu{
  display:flex;
  gap:24px;
  color:#9a9a9a;
  font-size:0.92rem;
}

.menu a:hover{
  color:white;
}

main{
  width:90%;
  max-width:820px;
  margin:auto;
  padding-top:140px;
  padding-bottom:120px;
}

.hero{
  margin-bottom:120px;
}

.hero h1{
  font-size:5rem;
  line-height:0.95;
  letter-spacing:-4px;
  margin-bottom:24px;
}

.hero p{
  color:#9d9d9d;
  max-width:720px;
  font-size:1.08rem;
}

.fragments{
  display:flex;
  flex-direction:column;
  gap:55px;
}

.fragment{
  border-left:1px solid rgba(255,255,255,0.08);
  padding-left:28px;
}

.fragment-text{
  font-size:1.8rem;
  line-height:1.45;
  letter-spacing:-1px;
}

.section-title{
  font-size:0.8rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#666;
  margin-bottom:40px;
}

footer{
  border-top:1px solid rgba(255,255,255,0.06);
  margin-top:120px;
  padding:40px 0;
  color:#666;
  font-size:0.92rem;
}

@media(max-width:768px){

  .hero h1{
    font-size:3rem;
    letter-spacing:-2px;
  }

  .fragment-text{
    font-size:1.35rem;
  }

}

</style>

</head>

<body>

<nav>

  <div class="nav-container">

    <div class="logo">
      Fragments
    </div>

    <div class="menu">
      <a href="index.html">Home</a>
      <a href="archive.html">Archive</a>
    </div>

  </div>

</nav>

<main>

<section class="hero">

<h1>
Fragments
</h1>

<p>
A curated archive of operational, organizational and systems thinking fragments by Francisco Cobos.
</p>

</section>

<section>

<div class="section-title">
FOUNDATIONAL FRAGMENTS
</div>

<section class="fragments" id="fragments-container">
</section>

</section>

<footer>
© 2026 Francisco Cobos · fragments.fcobos.com
</footer>

</main>

<script>

fetch('./fragments.json')
.then(response => response.json())
.then(data => {

  const container = document.getElementById('fragments-container');

  const shuffled = [...data].sort(() => 0.5 - Math.random());

  shuffled.slice(0, 8).forEach(fragment => {

    const article = document.createElement('article');

    article.className = 'fragment';

    article.innerHTML = `
      <div class="fragment-text">
        ${fragment.text}
      </div>
    `;

    container.appendChild(article);

  });

})
.catch(error => {

  console.error(error);

  document.getElementById('fragments-container').innerHTML = `
    <article class="fragment">
      <div class="fragment-text">
        Error loading fragments.
      </div>
    </article>
  `;

});

</script>

</body>
</html>
```
