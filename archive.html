<style>

<body>

<nav>

  <div class="nav-container">

    <div class="logo">
      Fragments

    <div class="menu">
      <a href="index.html">Home</a>
      <a href="archive.html">Archive</a>

    </div>

  </div>

</nav>

<main>

<section class="hero">

  <h1>
    Archive
  </h1>

  <p>
    A broader collection of operational, organizational and systems thinking fragments accumulated over time.
  </p>

</section>

<section class="search-container">

  <input
    type="text"
    id="search-input"
    class="search-input"
    placeholder="Search fragments..."
  >

  <div class="topic-filters" id="topic-filters">
  </div>

</section>

<section class="archive-grid" id="archive-container">
</section>

<footer>

<a href="https://fcobos.com">fcobos.com</a>
&nbsp;·&nbsp;
<a href="https://fragments.fcobos.com">Fragments</a>
&nbsp;·&nbsp;
<a href="https://commonsense.fcobos.com">Common Sense</a>
&nbsp;·&nbsp;
<a href="https://writing.fcobos.com">Writing</a>

<br><br>

<a href="legal.html">Legal</a>

</footer>

</main>

<script>

let allFragments = [];
let currentTopic = 'all';

const archiveContainer = document.getElementById('archive-container');
const searchInput = document.getElementById('search-input');
const topicFilters = document.getElementById('topic-filters');

function renderFragments(fragments) {

  archiveContainer.innerHTML = '';

  if (fragments.length === 0) {

    archiveContainer.innerHTML = `
      <div class="empty-state">
        No fragments found.
      </div>
    `;

    return;
  }

  fragments.forEach(fragment => {

    const article = document.createElement('article');

    article.className = 'fragment';

    article.innerHTML = `
      <div class="fragment-text">
        ${fragment.text}
      </div>

      <div class="fragment-meta">
        ${fragment.topic}
      </div>
    `;

    archiveContainer.appendChild(article);

  });

}

function applyFilters() {

  const query = searchInput.value.toLowerCase();

  let filtered = allFragments.filter(fragment => {

    const matchesSearch =
      fragment.text.toLowerCase().includes(query) ||
      fragment.topic.toLowerCase().includes(query);

    const matchesTopic =
      currentTopic === 'all' ||
      fragment.topic === currentTopic;

    return matchesSearch && matchesTopic;

  });

  renderFragments(filtered);

}

function createTopicFilters(fragments) {

  const topics = [...new Set(fragments.map(f => f.topic))];

  const allButton = document.createElement('button');

  allButton.className = 'topic-button active';

  allButton.textContent = 'all';

  allButton.onclick = () => {

    currentTopic = 'all';

    updateActiveButton(allButton);

    applyFilters();

  };

  topicFilters.appendChild(allButton);

  topics.sort().forEach(topic => {

    const button = document.createElement('button');

    button.className = 'topic-button';

    button.textContent = topic;

    button.onclick = () => {

      currentTopic = topic;

      updateActiveButton(button);

      applyFilters();

    };

    topicFilters.appendChild(button);

  });

}

function updateActiveButton(activeButton) {

  document.querySelectorAll('.topic-button').forEach(button => {
    button.classList.remove('active');
  });

  activeButton.classList.add('active');

}

async function loadArchive() {

  try {

    const response = await fetch('./archive.json');

    const data = await response.json();

    allFragments = data;

    createTopicFilters(allFragments);

    renderFragments(allFragments);

  } catch(error) {

    console.error(error);

    archiveContainer.innerHTML = `
      <div class="empty-state">
        Error loading archive.
      </div>
    `;

  }

}

searchInput.addEventListener('input', applyFilters);

loadArchive();

</script>

</body>

</html>
