    *{

    }

<nav>

  <div class="nav-container">

    <div class="logo">
      Fragments
    </div>

    <div class="menu">
      <a href="index.html">Home</a>
      <a href="archive.html">Archive</a>
      <a href="legal.html">Legal</a>
    </div>

  </div>

</nav>

<main>

  <section class="hero">

    <h1>
      Archive
    </h1>

    <p>
      A broader collection of operational, organizational and systems thinking fragments accumulated over time.
    </p>

  </section>

  <section class="archive-grid" id="archive-container">
  </section>

  <footer>

    <div>
      © 2026 Francisco Cobos · fragments.fcobos.com
    </div>

    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="legal.html">Legal</a>
      <a href="https://fcobos.com" target="_blank">fcobos.com</a>
      <a href="https://fcobos.medium.com" target="_blank">Medium</a>
    </div>

  </footer>

</main>

<script>

async function loadArchive() {

  try {

    const response = await fetch('./archive.json');

    const data = await response.json();

    const container = document.getElementById('archive-container');

    data.forEach(fragment => {

      const article = document.createElement('article');

      article.className = 'fragment';

      article.innerHTML = `
        <div class="fragment-text">
          ${fragment.text}
        </div>

        <div class="fragment-meta">
          ${fragment.year} · ${fragment.topic}
        </div>
      `;

      container.appendChild(article);

    });

  } catch(error) {

    console.error(error);

    document.getElementById('archive-container').innerHTML = `
      <article class="fragment">
        <div class="fragment-text">
          Error loading archive.
        </div>
      </article>
    `;

  }

}

loadArchive();

</script>

</body>

</html>
